<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cast in Skin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --ink: #f2ede4;
    --ink-dim: rgba(242,237,228,0.62);
    --line: rgba(242,237,228,0.22);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    overflow-x: hidden;
  }

  .stage {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 68% 45%;
    filter: saturate(0.92) contrast(1.03);
  }

  .scrim {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 90% at 50% 42%, rgba(5,7,10,0.35) 0%, rgba(5,7,10,0.72) 55%, rgba(5,7,10,0.94) 100%),
      linear-gradient(to bottom, rgba(5,7,10,0.55) 0%, rgba(5,7,10,0.15) 22%, rgba(5,7,10,0.15) 70%, rgba(5,7,10,0.85) 100%);
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .mark {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-style: normal;
    font-size: clamp(2.6rem, 8vw, 6rem);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1.05;
    color: var(--ink);
    text-shadow: 0 2px 40px rgba(0,0,0,0.55);
  }

  .rule {
    width: 64px;
    height: 1px;
    background: var(--line);
    margin: 28px 0 26px;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(0.95rem, 1.6vw, 1.15rem);
    letter-spacing: 0.02em;
    color: var(--ink-dim);
    max-width: 34ch;
  }

  .contact {
    position: relative;
    z-index: 2;
    margin-top: clamp(40px, 8vh, 90px);
    text-align: center;
  }

  .contact a {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    transition: color 0.25s ease, border-color 0.25s ease;
  }

  .contact a:hover,
  .contact a:focus-visible {
    color: var(--ink);
    border-color: var(--ink-dim);
  }

  .foot {
    position: absolute;
    bottom: 28px;
    left: 0;
    right: 0;
    z-index: 2;
    text-align: center;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(242,237,228,0.38);
  }

  .contact-primary {
    color: var(--ink) !important;
    border-color: var(--ink-dim) !important;
  }

  .contact-row {
    display: flex;
    gap: 28px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  @media (max-width: 600px) {
    .stage img { object-position: 74% 42%; }
  }
</style>
</head>
<body>

<div class="stage">
  <img src="hero_20260705_0151.jpg" alt="">
  <div class="scrim"></div>
  <div class="content">
    <div class="mark">Cast in Skin</div>
    <div class="rule"></div>
    <p class="tagline">These are magic spells cast into skin.<br>Traditional Thai Sak Yant tattoos.<br>Get in touch to plan your tattoo.</p>
  </div>
  <div class="contact">
    <div class="contact-row">
      <a href="https://m.me/61590355785292" class="contact-primary">Messenger</a>
      <a href="https://line.me/R/ti/p/@shallowdepth">Line</a>
      <a href="mailto:tong@castinskin.com">Email</a>
    </div>
  </div>
</div>

<div class="foot">Bangkok, Thailand</div>

</body>
</html>
