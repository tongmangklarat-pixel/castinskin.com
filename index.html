<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cast in Skin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070a;
    --ink: #f2ede4;
    --ink-dim: rgba(242,237,228,0.62);
    --line: rgba(242,237,228,0.22);
    --gold: #c49a3c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    overflow-x: hidden;
  }

  .stage {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 68% 45%;
    filter: saturate(0.92) contrast(1.03);
  }

  .scrim {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 90% at 50% 42%, rgba(5,7,10,0.35) 0%, rgba(5,7,10,0.72) 55%, rgba(5,7,10,0.94) 100%),
      linear-gradient(to bottom, rgba(5,7,10,0.55) 0%, rgba(5,7,10,0.15) 22%, rgba(5,7,10,0.15) 70%, rgba(5,7,10,0.85) 100%);
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .mark {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-style: normal;
    font-size: clamp(2.6rem, 8vw, 6rem);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1.05;
    color: var(--ink);
    text-shadow: 0 2px 40px rgba(0,0,0,0.55);
  }

  .rule {
    width: 64px;
    height: 1px;
    background: var(--line);
    margin: 28px 0 26px;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(0.95rem, 1.6vw, 1.15rem);
    letter-spacing: 0.02em;
    color: var(--ink-dim);
    max-width: 34ch;
  }

  .tagline-gold {
    color: var(--gold);
  }

  .cta {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.2rem, 2.4vw, 1.55rem);
    letter-spacing: 0.01em;
    color: var(--ink);
    max-width: 34ch;
    margin-top: 30px;
  }

  .contact {
    position: relative;
    z-index: 2;
    margin-top: 20px;
    text-align: center;
  }

  .contact a {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    transition: color 0.25s ease, border-color 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .contact a svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .contact a:hover,
  .contact a:focus-visible {
    color: var(--ink);
    border-color: var(--ink-dim);
  }

  .foot {
    position: absolute;
    bottom: 28px;
    left: 0;
    right: 0;
    z-index: 2;
    text-align: center;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(242,237,228,0.38);
  }

  .contact-primary {
    color: var(--ink) !important;
    border-color: var(--ink-dim) !important;
  }

  .contact-row {
    display: flex;
    gap: 28px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  @media (max-width: 600px) {
    .stage {
      min-height: 0;
      height: auto;
      display: block;
    }
    .stage img {
      position: static;
      width: 100%;
      height: auto;
      object-fit: initial;
      object-position: initial;
      display: block;
    }
    .scrim {
      position: absolute;
      inset: 0;
    }
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
    }
  }
</style>
</head>
<body>

<div class="stage">
  <img src="hero_20260705_0151.jpg" alt="">
  <div class="scrim"></div>
  <div class="content">
    <div class="mark">Cast in Skin</div>
    <div class="rule"></div>
    <p class="tagline"><span class="tagline-gold">These are magic spells cast into skin.</span><br>Traditional Thai Sak Yant tattoos.</p>
    <p class="cta">Get in touch to plan your tattoo.</p>
    <div class="contact">
      <div class="contact-row">
        <a href="https://line.me/R/ti/p/@shallowdepth" class="contact-primary">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="12" fill="#06C755"/>
            <path d="M18.36 11.2c0-2.87-2.88-5.2-6.36-5.2s-6.36 2.33-6.36 5.2c0 2.57 2.28 4.72 5.37 5.13.21.05.49.14.56.33.06.16.04.42.02.59l-.09.55c-.03.16-.13.63.55.34.68-.28 3.68-2.17 5.02-3.71 1-.93 1.29-1.87 1.29-2.83" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Line
        </a>
        <a href="mailto:tong@castinskin.com">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="12" fill="rgba(242,237,228,0.14)"/>
            <path d="M6.5 8.5h11a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-11a1 1 0 0 1-1-1v-5a1 1 0 0 1 1-1z" fill="none" stroke="#f2ede4" stroke-width="1.1"/>
            <path d="M6 9l6 4.2L18 9" fill="none" stroke="#f2ede4" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Email
        </a>
      </div>
    </div>
  </div>
</div>

<div class="foot">Bangkok, Thailand</div>

</body>
</html>
